name: 毎朝のデータ収集

on:
  schedule:
    - cron: "0 21 * * *" # 毎朝6:00 JST
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: データ収集
        env:
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
        run: node scripts/collect.mjs
      - name: 結果をコミット
        run: |
          git config user.name "insta-research-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: $(date -u +%Y-%m-%d) の収集結果"
          git pull --rebase origin main || true
          git push
