name: アカウント発掘検索

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "検索キーワード"
        required: true
        type: string

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: アカウント発掘
        env:
          BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
          GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          KEYWORD: ${{ inputs.keyword }}
        run: node scripts/discover.mjs "$KEYWORD"
      - name: 結果をコミット
        run: |
          git config user.name "insta-research-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "discover: 「${{ inputs.keyword }}」の発掘結果"
          git pull --rebase origin main || true
          git push
