<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>インスタ キーワードリサーチ</title>
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --text: #3d3a34;
    --sub: #8a857c;
    --accent: #e8927c;
    --accent2: #7cb8a8;
    --gold: #d4a94e;
    --border: #eee8de;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Yu Gothic", sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 640px; margin: 0 auto; padding: 16px 14px 60px;
  }
  header { padding: 18px 4px 4px; display: flex; align-items: flex-start; gap: 8px; }
  header > div { flex: 1; }
  h1 { font-size: 20px; letter-spacing: .02em; }
  .lead { color: var(--sub); font-size: 12px; margin-top: 4px; line-height: 1.6; }
  .gear {
    border: 1px solid var(--border); background: var(--card); border-radius: 10px;
    font-size: 16px; padding: 6px 10px; cursor: pointer;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px; margin-top: 12px;
    box-shadow: 0 1px 3px rgba(0,0,0,.03);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .rank { font-size: 15px; font-weight: 700; color: var(--gold); min-width: 26px; text-align: center; }
  .name { font-weight: 700; font-size: 15px; word-break: break-all; }
  .name a { color: inherit; text-decoration: none; }
  .big { font-size: 16px; font-weight: 700; }
  .small { font-size: 11px; color: var(--sub); }
  .bio { font-size: 11px; color: var(--sub); margin-top: 4px; line-height: 1.5; }
  .post-cap { font-size: 12px; line-height: 1.55; }
  .post-meta { font-size: 11px; color: var(--sub); margin-top: 4px; display: flex; gap: 10px; flex-wrap: wrap; }
  .post-meta a { color: var(--accent); font-weight: 600; }
  .badge {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 999px; background: #f6ece7; color: var(--accent); font-weight: 600;
  }
  .empty { color: var(--sub); font-size: 12px; padding: 8px 4px; }
  .btn {
    border: none; background: var(--accent); color: #fff; font-weight: 600;
    border-radius: 10px; padding: 10px 18px; font-size: 14px; cursor: pointer;
  }
  .btn.sub { background: var(--card); color: var(--sub); border: 1px solid var(--border); }
  .btn:disabled { opacity: .5; }
  .inline { display: flex; gap: 8px; }
  .inline input {
    flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
    font-size: 14px; background: #fffdfa;
  }
  .chip {
    display: inline-block; background: #f4efe8; border: none; border-radius: 999px;
    padding: 6px 14px; font-size: 12px; margin: 3px 4px 3px 0; cursor: pointer; font-weight: 600;
  }
  .chip.active { background: var(--accent); color: #fff; }
  .sort-tabs { display: flex; gap: 6px; margin-top: 10px; }
  .sort-tabs button {
    border: 1px solid var(--border); background: var(--card); color: var(--sub);
    border-radius: 999px; padding: 4px 12px; font-size: 11px; font-weight: 600; cursor: pointer;
  }
  .sort-tabs button.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #status { font-size: 12px; margin-top: 8px; color: var(--accent2); min-height: 1.2em; }
  #status.warn { color: var(--accent); }
  h2 { font-size: 13px; color: var(--sub); font-weight: 600; margin: 20px 4px 4px; letter-spacing: .06em; }
  #settings { display: none; }
  #settings.open { display: block; }
  #settings input {
    width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    font-size: 13px; background: #fffdfa;
  }
  code { background: #f4efe8; border-radius: 4px; padding: 1px 5px; font-size: 12px; }
  footer { margin-top: 34px; text-align: center; color: var(--sub); font-size: 11px; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🔎 インスタ キーワードリサーチ</h1>
    <div class="lead">キーワードに関連するアカウントを、フォロワー数・バズ投稿つきでリサーチします</div>
  </div>
  <button class="gear" id="gear" title="設定">⚙️</button>
</header>

<section id="settings" class="card">
  <div id="token-setup">
    <div style="font-weight:700; font-size:13px; margin-bottom:6px;">🔑 初回設定（1回だけ・2分）</div>
    <div class="small" style="line-height:1.8; margin-bottom:8px;">
      検索の実行にGitHubのアクセストークンが必要です：<br>
      <b>1.</b> 下のボタンで作成ページを開く（権限は選択済み）<br>
      <b>2.</b> Expirationを「No expiration」にして緑の「<b>Generate token</b>」<br>
      <b>3.</b> 表示された <code>ghp_...</code> をコピーして貼り付け → 保存
    </div>
    <div style="margin-bottom:10px;">
      <a href="https://github.com/settings/tokens/new?scopes=repo,workflow&description=insta-research-app" target="_blank"
         class="btn" style="display:inline-block; text-decoration:none; font-size:12px;">① トークン作成ページを開く</a>
    </div>
    <div class="inline">
      <input type="password" id="token-input" placeholder="ghp_... を貼り付け">
      <button class="btn" id="token-save" style="font-size:12px;">③ 保存</button>
    </div>
  </div>
  <div id="token-ok" style="display:none;">
    <div class="small">✅ トークン設定済み。検索が使えます。</div>
    <button class="btn sub" id="token-clear" style="margin-top:8px; font-size:12px;">トークン設定を削除</button>
  </div>
</section>

<div class="card">
  <div class="inline">
    <input type="text" id="kw" placeholder="キーワード（例: スニーカー、車、キャンプ）">
    <button class="btn" id="run">検索</button>
    <button class="btn sub" id="cancel" style="display:none;">停止</button>
  </div>
  <div id="status"></div>
</div>

<h2>検索履歴（タップで表示）</h2>
<div id="history"></div>

<div id="result"></div>

<footer>完全無料運用 / 検索1回 約3〜5分</footer>

<script>
const OWNER = "ShoMikoda", REPO = "insta-research";
const fmt = (n) => n == null ? "-" : n.toLocaleString("ja-JP");
const pct = (n) => n == null ? "-" : (n * 100).toFixed(1) + "%";
const $ = (id) => document.getElementById(id);
const token = () => localStorage.getItem("gh_token");
let currentSlug = null, sortMode = "followers";
let currentRunId = null, cancelRequested = false;

function status(msg, warn = false) {
  $("status").textContent = msg;
  $("status").className = warn ? "warn" : "";
}

async function gh(path, opts = {}) {
  const r = await fetch(`https://api.github.com${path}`, {
    cache: "no-store",
    ...opts,
    headers: {
      Authorization: `Bearer ${token()}`,
      Accept: "application/vnd.github+json",
      "X-GitHub-Api-Version": "2022-11-28",
      ...(opts.headers || {}),
    },
  });
  if (!r.ok) throw new Error(`GitHub API ${r.status}: ${(await r.text()).slice(0, 150)}`);
  return r.status === 204 ? null : r.json();
}

function renderSettings() {
  const has = !!token();
  $("token-setup").style.display = has ? "none" : "block";
  $("token-ok").style.display = has ? "block" : "none";
}

$("gear").addEventListener("click", () => { $("settings").classList.toggle("open"); renderSettings(); });

$("token-save").addEventListener("click", async () => {
  const t = $("token-input").value.trim();
  if (!t) return;
  localStorage.setItem("gh_token", t);
  try {
    await gh(`/repos/${OWNER}/${REPO}`);
    status("トークンを確認・保存しました。検索できます");
    renderSettings();
  } catch (e) {
    localStorage.removeItem("gh_token");
    status("トークンが無効です: " + e.message, true);
  }
});

$("token-clear").addEventListener("click", () => { localStorage.removeItem("gh_token"); renderSettings(); });

async function loadHistory(activeSlug) {
  let index = [];
  try {
    index = await fetch(`../data/discover/index.json?t=${Date.now()}`).then((r) => r.ok ? r.json() : []);
  } catch (e) { /* なし */ }
  $("history").innerHTML = index.map((s) =>
    `<button class="chip ${s.slug === activeSlug ? "active" : ""}" onclick="showResult('${s.slug}')">${s.keyword} <span style="font-weight:400;">(${s.date})</span></button>`
  ).join("") || `<span class="empty">まだ検索していません。上の検索ボックスからどうぞ</span>`;
  return index;
}

window.showResult = async (slug) => {
  currentSlug = slug;
  let d;
  try {
    d = await fetch(`../data/discover/${slug}.json?t=${Date.now()}`).then((r) => r.json());
  } catch (e) {
    $("result").innerHTML = `<div class="empty">結果の読み込みに失敗しました</div>`;
    return;
  }
  loadHistory(slug);

  const accounts = [...(d.accounts ?? [])];
  const maxLikes = (a) => Math.max(0, ...(a.top_posts ?? []).map((x) => x.likes ?? 0));
  if (sortMode === "buzz") accounts.sort((a, b) => maxLikes(b) - maxLikes(a));
  else accounts.sort((a, b) => (b.followers ?? 0) - (a.followers ?? 0));

  $("result").innerHTML = `
    <h2>「${d.keyword}」の検索結果 — ${d.accounts.length}アカウント（${d.date}）</h2>
    <div class="small" style="margin:0 4px;">Instagram内を「${d.keyword}」で検索してヒットしたアカウントです</div>
    <div class="sort-tabs">
      <button class="${sortMode === "followers" ? "active" : ""}" onclick="setSort('followers')">👑 フォロワー順</button>
      <button class="${sortMode === "buzz" ? "active" : ""}" onclick="setSort('buzz')">🔥 バズ投稿順</button>
    </div>
    <div class="small" style="margin:6px 4px 0;">🔥バズ投稿順＝直近${d.posts_depth ?? 12}投稿のうち最高いいね数が大きい順（リール再生回数はInstagramが非公開のため、いいね数でバズを判定しています）</div>
    ${accounts.map((a, i) => `
      <div class="card">
        <div class="row" style="align-items:flex-start;">
          <div class="rank">${["🥇","🥈","🥉"][i] ?? i + 1}</div>
          <div style="flex:1; min-width:0;">
            <div class="name"><a href="https://www.instagram.com/${a.account}/" target="_blank">@${a.account} ↗</a> ${a.is_verified ? "✅" : ""}</div>
            <div class="bio">${a.biography ?? ""}</div>
          </div>
          <div style="text-align:right; white-space:nowrap;">
            <div class="big">${fmt(a.followers)}</div>
            <div class="small">フォロワー</div>
          </div>
        </div>
        ${(a.top_posts ?? []).length ? `<div class="small" style="margin-top:10px; font-weight:700;">🔥 この人のバズ投稿TOP${a.top_posts.length}（直近${a.posts_scanned ?? 12}投稿から）</div>` : ""}
        ${(a.top_posts ?? []).map((x, j) => `
          <div class="row" style="margin-top:8px; align-items:flex-start;">
            <div class="rank" style="font-size:11px;">${j + 1}</div>
            <div style="flex:1; min-width:0;">
              <div class="post-cap">${x.caption ?? ""}${(x.caption ?? "").length >= 90 ? "…" : ""}</div>
              <div class="post-meta">
                <span>❤️ ${fmt(x.likes)}</span>
                <span>💬 ${fmt(x.comments)}</span>
                ${x.is_video ? `<span class="badge">リール/動画</span>` : ""}
                <span>${x.date ?? ""}</span>
                <a href="${x.url}" target="_blank">投稿を見る ↗</a>
              </div>
            </div>
          </div>`).join("")}
      </div>`).join("") || `<div class="empty">アカウントが見つかりませんでした</div>`}`;
};

window.setSort = (m) => { sortMode = m; if (currentSlug) showResult(currentSlug); };

$("run").addEventListener("click", async () => {
  const kw = $("kw").value.trim();
  if (!kw) { status("キーワードを入力してください", true); return; }
  if (!token()) {
    $("settings").classList.add("open");
    renderSettings();
    $("settings").scrollIntoView({ behavior: "smooth" });
    status("⬆ 検索を使うには、上の初回設定（2分）だけお願いします", true);
    return;
  }
  const btn = $("run");
  btn.disabled = true;
  $("cancel").style.display = "inline-block";
  cancelRequested = false;
  currentRunId = null;
  try {
    status("検索を開始しています...");
    await gh(`/repos/${OWNER}/${REPO}/actions/workflows/discover.yml/dispatches`, {
      method: "POST",
      body: JSON.stringify({ ref: "main", inputs: { keyword: kw } }),
    });
    await new Promise((r) => setTimeout(r, 8000));
    const runs = await gh(`/repos/${OWNER}/${REPO}/actions/runs?per_page=1&event=workflow_dispatch`);
    currentRunId = runs.workflow_runs?.[0]?.id;
    if (cancelRequested) {
      await gh(`/repos/${OWNER}/${REPO}/actions/runs/${currentRunId}/cancel`, { method: "POST" }).catch(() => {});
    }
    for (let i = 0; i < 60; i++) {
      await new Promise((r) => setTimeout(r, 10000));
      const run = await gh(`/repos/${OWNER}/${REPO}/actions/runs/${currentRunId}`);
      status(`「${kw}」をリサーチ中... (約${Math.round((i + 1) / 6 * 10) / 10}分経過。3〜5分かかります)`);
      if (run.status === "completed") {
        if (run.conclusion === "cancelled") { status("検索を停止しました"); return; }
        if (run.conclusion !== "success") throw new Error("検索に失敗しました。キーワードを変えてお試しください");
        break;
      }
    }
    status("リサーチ完了。結果を反映中(約1分)...");
    await new Promise((r) => setTimeout(r, 70000));
    const index = await loadHistory();
    if (index[0]) showResult(index[0].slug);
    status(`「${kw}」の結果を表示しました`);
    $("kw").value = "";
  } catch (e) {
    status(e.message, true);
  } finally {
    btn.disabled = false;
    $("cancel").style.display = "none";
    currentRunId = null;
  }
});

$("cancel").addEventListener("click", async () => {
  cancelRequested = true;
  status("停止しています...");
  if (currentRunId) {
    try {
      await gh(`/repos/${OWNER}/${REPO}/actions/runs/${currentRunId}/cancel`, { method: "POST" });
    } catch (e) { /* 既に終了している場合など */ }
  }
});

$("kw").addEventListener("keydown", (e) => { if (e.key === "Enter") $("run").click(); });

loadHistory().then((index) => { if (index[0]) showResult(index[0].slug); });
</script>
</body>
</html>
